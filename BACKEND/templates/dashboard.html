<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SmartReco Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
            color: white;
        }

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #ffe6ff;
        }

        .hero {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 1.2s ease;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            padding: 20px 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 18px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.25);
        }

        .card i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .charts {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        canvas {
            background: white;
            border-radius: 15px;
            padding: 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

   <!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">SmartReco</div>

    <a href="/index.html">الرئيسية</a>
    <a href="/recommend.html">التوصيات</a>
    <a href="/dashboard.html">الإحصائيات</a>
    <a href="/how_it_works.html">كيف يعمل النظام؟</a>
    <a href="/about.html">من نحن</a>
    <a href="/cart.html" class="cart-btn">السلة <span id="cartCount"></span></a>
</nav>


    <div class="hero">
        <h1>لوحة التحكم الذكية</h1>
        <p>تحليل شامل لبيانات المستخدمين والمنتجات والتقييمات</p>
    </div>

    <div class="cards">
        <div class="card">
            <i class="fa-solid fa-users"></i>
            <h2 id="users">0</h2>
            <p>عدد المستخدمين</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-box"></i>
            <h2 id="products">0</h2>
            <p>عدد المنتجات</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-star"></i>
            <h2 id="ratings">0</h2>
            <p>عدد التقييمات</p>
        </div>

        <div class="card">
            <i class="fa-solid fa-chart-pie"></i>
            <h2 id="top_category">-</h2>
            <p>أكثر فئة انتشاراً</p>
        </div>
    </div>

    <div class="charts">
        <canvas id="categoryChart"></canvas>
        <canvas id="ratingChart"></canvas>
    </div>

    <footer>
        © 2026 SmartReco — جميع الحقوق محفوظة
    </footer>

    <script>
        fetch("/api/dashboard")
            .then(res => res.json())
            .then(data => {
                document.getElementById("users").innerText = data.users;
                document.getElementById("products").innerText = data.products;
                document.getElementById("ratings").innerText = data.ratings;
                document.getElementById("top_category").innerText = data.top_category;

                new Chart(document.getElementById("categoryChart"), {
                    type: "pie",
                    data: {
                        labels: data.category_labels,
                        datasets: [{
                            data: data.category_counts,
                            backgroundColor: ["#ff6bcb", "#6a11cb", "#2575fc", "#ff9f43", "#1dd1a1", "#ee5253", "#48dbfb"]
                        }]
                    }
                });

                new Chart(document.getElementById("ratingChart"), {
                    type: "bar",
                    data: {
                        labels: data.rating_labels,
                        datasets: [{
                            label: "عدد التقييمات",
                            data: data.rating_counts,
                            backgroundColor: "#ffe6ff"
                        }]
                    },
                    options: {
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            });
    </script>

</body>
</html>
